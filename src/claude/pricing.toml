# Per-model pricing + context-window table (FR-3/AC-4, NFR-4).
#
# Prices are USD per million tokens ($/MTok); `context_window` is in tokens.
# Keys are matched against the model id by longest prefix, so dated ids
# (e.g. `claude-haiku-4-5-20251001`) resolve to the right row.
#
# Sources (web-verified, see specs/research-dossier.json / CLAUDE.md):
#   - platform.claude.com/docs/en/about-claude/pricing
#   - platform.claude.com/docs/en/about-claude/models/overview
# Cache multipliers vs base input: write-5m 1.25x, write-1h 2x, read 0.1x.
# Windows: Opus 4.8/4.7/4.6 & Sonnet 4.6 = 1M; Opus 4.5 / Sonnet 4.5 / Haiku 4.5 = 200k.
#
# To update: edit a row (or add one) and rebuild — the table is embedded at
# compile time. Add the dated id as its own key only if its rates differ.

[model."claude-opus-4-8"]
input = 5.0
output = 25.0
cache_read = 0.5
cache_write_5m = 6.25
cache_write_1h = 10.0
context_window = 1_000_000

